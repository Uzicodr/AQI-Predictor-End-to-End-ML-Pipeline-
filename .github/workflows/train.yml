name: Backfill and Train

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill_and_train:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas python-dotenv pymongo scikit-learn
      
      - name: Create .env file
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          echo "OPENWEATHER_API_KEY=$OPENWEATHER_API_KEY" > .env
          echo "MONGODB_URI=$MONGODB_URI" >> .env
      
      - name: Run backfill.py
        run: python backfill.py
      
      - name: Run training_pipeline.py
        run: python training_pipeline.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Auto: Backfill data and train model" || echo "No changes to commit"
          git push
