name: Backfill and Train

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: backfill-and-train
  cancel-in-progress: false

jobs:
  backfill_and_train:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install \
            requests \
            pandas \
            python-dotenv \
            pymongo[srv] \
            dnspython \
            certifi \
            scikit-learn

      - name: Create .env
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          echo "OPENWEATHER_API_KEY=$OPENWEATHER_API_KEY" > .env
          echo "MONGODB_URI=$MONGODB_URI" >> .env

      - name: Verify MongoDB connection
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          python - <<EOF
          from pymongo import MongoClient
          import certifi
          import os

          uri = os.getenv("MONGODB_URI")

          client = MongoClient(
              uri,
              tls=True,
              tlsCAFile=certifi.where(),
              serverSelectionTimeoutMS=30000
          )

          print(client.admin.command("ping"))
          print("MongoDB connection successful")
          EOF

      - name: Run backfill
        run: python backfill.py

      - name: Run training pipeline
        run: python training_pipeline.py

      - name: Configure Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "github-actions[bot]"

      - name: Pull latest changes
        run: |
          git pull --rebase origin master

      - name: Commit changes
        run: |
          git add -A
          git commit -m "Auto: Backfill data and train model" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push origin HEAD:master
