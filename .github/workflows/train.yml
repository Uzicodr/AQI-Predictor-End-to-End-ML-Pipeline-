name: AQI Pipelines

on:
  schedule:
    - cron: "0 * * * *"
    - cron: "15 0 * * *"
  workflow_dispatch:
    inputs:
      run_training:
        description: "Also run daily training"
        required: false
        default: "true"

permissions:
  contents: write

concurrency:
  group: aqi-pipelines
  cancel-in-progress: false

jobs:
  feature_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run hourly feature pipeline
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python feature_pipeline.py

      - name: Commit feature artifacts
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "github-actions[bot]"
          git add data/aqi_data.csv data/aqi_features.csv
          git diff --cached --quiet || git commit -m "Auto: update AQI feature store artifacts"
          git pull --rebase origin master
          git push origin master

  training_pipeline:
    runs-on: ubuntu-latest
    needs: feature_pipeline
    if: github.event.schedule == '15 0 * * *' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily training pipeline
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python training_pipeline.py

      - name: Commit model artifacts
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "github-actions[bot]"
          git add data/aqi_forecast_model.pkl data/aqi_xgb_model.pkl data/label_encoder.pkl data/feature_columns.pkl data/shap_importance.pkl data/shap_feature_importance.csv data/model_registry_latest.pkl
          git diff --cached --quiet || git commit -m "Auto: train AQI forecast model"
          git pull --rebase origin master
          git push origin master
